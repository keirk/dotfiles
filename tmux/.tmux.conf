# -- General -------------------------------------------------------------------

# Use C-a instead of C-b (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start window/pane numbering at 1 (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't auto-rename windows after you've set a custom name
set -g allow-rename off

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape delay (important for vim/neovim users)
set -s escape-time 10

# Enable true color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*256col*:Tc"

set -s extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'

# -- Key Bindings --------------------------------------------------------------

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

unbind-key x               # unbind-key “x” from it’s current job of “ask and then close”
bind-key x kill-pane       # rebind-key it to just “close”
bind-key X kill-session    # key combo for killing the entire session - <prefix> + shift + x

set -g mouse on
set -g mode-keys vi

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'


# -- tmux2k theme --------------------------------------------------------------
set -g @tmux2k-theme 'onedark'
set -g @tmux2k-show-powerline true
set -g @tmux2k-icons-only false
set -g status-position bottom


run '~/.tmux/plugins/tpm/tpm'